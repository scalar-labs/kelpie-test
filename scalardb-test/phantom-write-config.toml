[modules]
  [modules.preprocessor]
    name = "kelpie.scalardb.sensor.SensorPreparer"
    path = "build/libs/scalardb-test-all.jar"
  [modules.processor]
    name = "kelpie.scalardb.sensor.SensorProcessor"
    path = "build/libs/scalardb-test-all.jar"
  [modules.postprocessor]
    name = "kelpie.scalardb.sensor.SensorChecker"
    path = "build/libs/scalardb-test-all.jar"
  [[modules.injectors]]
    name = "kelpie.scalardb.injector.CassandraKiller"
    path = "build/libs/scalardb-test-all.jar"

[common]
  concurrency = 5
  run_for_sec = 900
  ramp_for_sec = 0
  log_enabled_when_error = false

[stats]
  realtime_report_enabled = false

[test_config]
  is_verification = true
  num_devices = 10
  checker_retry_interval_millis = 1000
  checker_max_retries_for_read = 10

[storage_config]
  storage = "cassandra"
  contact_points = "cassandra1,cassandra2,cassandra3"
  username = "cassandra"
  password = "cassandra"
  isolation_level = "SERIALIZABLE"

[killer_config]
  ssh_user = "root"
  ssh_port = 22
  ssh_private_key = "/root/.ssh/id_ed25519"
  contact_points = "cassandra1,cassandra2,cassandra3"
  max_kill_interval_sec = 300
