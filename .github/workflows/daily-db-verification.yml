name: Daily DB verification

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SCHEMA_LOADER_VERSION: "4.0.0-SNAPSHOT"
    strategy:
      fail-fast: false
      matrix:
        test:
          - name: phantom-write
            schema: tx_sensor.json
            config: phantom-write-config.toml
          - name: write-skew
            schema: tx_transfer.json
            config: write-skew-config.toml
    name: verify (${{ matrix.test.name }})
    defaults:
      run:
        working-directory: scalardb-test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never

      - name: Build shadow jar
        run: ./gradlew shadowJar -PgprUsername="${{ github.repository_owner }}" -PgprPassword="${{ secrets.CR_PAT }}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build images (with GHA cache)
        working-directory: scalardb-test/docker
        run: |
          docker buildx bake -f docker-compose.yml \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max" \
            --load

      - name: Generate SSH key
        working-directory: scalardb-test/docker
        run: ./make-key.sh

      - name: Bring up the cluster
        working-directory: scalardb-test/docker
        run: docker compose up -d --wait

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Create tables
        working-directory: scalardb-test/docker
        run: |
          {
            echo "scalar.db.storage=cassandra"
            echo "scalar.db.contact_points=cassandra1,cassandra2,cassandra3"
            echo "scalar.db.username=cassandra"
            echo "scalar.db.password=cassandra"
          } > "$RUNNER_TEMP/schema-loader.properties"

          # Run the schema loader on the cluster's Docker network so it can
          # reach the Cassandra nodes by their compose hostnames.
          net=$(docker inspect -f '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{end}}' cassandra1)
          docker run --rm --network "$net" \
            -v "$RUNNER_TEMP/schema-loader.properties:/scalardb.properties:ro" \
            -v "$(pwd)/../schema:/schema:ro" \
            "ghcr.io/scalar-labs/scalardb-schema-loader:${SCHEMA_LOADER_VERSION}" \
            --config /scalardb.properties \
            --schema-file "/schema/${{ matrix.test.schema }}" \
            --coordinator \
            --replication-factor 3

      - name: Run verification
        id: kelpie
        working-directory: scalardb-test/docker
        run: |
          mkdir -p logs
          set -o pipefail
          docker compose exec -T client \
            kelpie --config ${{ matrix.test.config }} --inject \
            2>&1 | tee logs/kelpie.log

      - name: Collect Cassandra logs
        if: always()
        working-directory: scalardb-test/docker
        run: |
          mkdir -p logs
          for node in cassandra1 cassandra2 cassandra3; do
            docker compose cp "$node:/var/log/cassandra" "logs/$node" || true
          done

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verification-logs-${{ matrix.test.name }}
          path: scalardb-test/docker/logs
          if-no-files-found: warn

      - name: Record result
        if: always()
        run: |
          mkdir -p results
          if [ "${{ steps.kelpie.outcome }}" = "success" ]; then
            echo "${{ matrix.test.name }}:success" > "results/result-${{ matrix.test.name }}.txt"
          else
            echo "${{ matrix.test.name }}:failure" > "results/result-${{ matrix.test.name }}.txt"
          fi

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: result-${{ matrix.test.name }}
          path: scalardb-test/results/result-${{ matrix.test.name }}.txt

      - name: Tear down
        if: always()
        working-directory: scalardb-test/docker
        run: docker compose down -v

  notify-slack:
    name: Notify Slack
    if: always()
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Download result artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p results
          gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name | startswith("result-")) | .name' | \
            while read name; do
              echo "Downloading $name"
              gh run download ${{ github.run_id }} -n "$name" -D results -R "${{ github.repository }}"
            done

      - name: Build Slack message
        id: message
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          successes=""
          failures=""
          timeouts=""

          # Names of every matrix shard that ran (or was supposed to run).
          expected=$(gh api --paginate \
            "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
            --jq '.jobs[] | select(.name | startswith("verify (")) | .name | sub("^verify \\("; "") | sub("\\)$"; "")')

          found=""
          for file in results/result-*.txt; do
            [ -f "$file" ] || continue
            while read -r line; do
              name=$(echo "$line" | cut -d: -f1)
              status=$(echo "$line" | cut -d: -f2)
              found="${found} ${name}"
              case "$status" in
                success) successes="${successes}- ${name}\n" ;;
                timeout) timeouts="${timeouts}- ${name}\n" ;;
                *)       failures="${failures}- ${name}\n" ;;
              esac
            done < "$file"
          done

          for test in $expected; do
            if ! echo "$found" | grep -qw "$test"; then
              timeouts="${timeouts}- ${test} (no result)\n"
            fi
          done

          if [ -n "$failures" ] || [ -n "$timeouts" ]; then
            icon=":fire:"
          else
            icon=":white_check_mark:"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "message<<EOF"
            printf "%s *ScalarDB verification*\n\n" "$icon"
            printf "*Success:*\n%s\n" "$successes"
            printf "*Failed:*\n%s\n"  "$failures"
            printf "*Timed out:*\n%s\n" "$timeouts"
            printf "<%s|View logs>\n" "$RUN_URL"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post to Slack
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\": \"${{ steps.message.outputs.message }}\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
