name: Daily DB benchmark

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:
    inputs:
      kelpie_version:
        description: "Kelpie release version"
        type: string
        default: "1.2.4"
      schema_loader_version:
        description: "scalardb-schema-loader image tag"
        type: string
        default: "4.0.0-SNAPSHOT"
      run_for_sec:
        description: "Workload duration in seconds"
        type: string
        default: "200"
      ramp_for_sec:
        description: "Ramp-up duration in seconds"
        type: string
        default: "10"
      concurrencies:
        description: "Comma-separated list of workload concurrencies"
        type: string
        default: "1,2,4,8,16,32"

permissions:
  contents: write
  packages: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: scalardb-test

    env:
      # Fallback defaults are needed for `schedule` triggers, which do not
      # apply `workflow_dispatch` input defaults.
      KELPIE_VERSION: ${{ inputs.kelpie_version || '1.2.4' }}
      SCHEMA_LOADER_VERSION: ${{ inputs.schema_loader_version || '4.0.0-SNAPSHOT' }}
      RUN_FOR_SEC: ${{ inputs.run_for_sec || '200' }}
      RAMP_FOR_SEC: ${{ inputs.ramp_for_sec || '10' }}
      CONCURRENCIES: ${{ inputs.concurrencies || '1,2,4,8,16,32' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          add-job-summary: never

      - name: Build shadow jar
        run: ./gradlew shadowJar -PgprUsername="${{ github.repository_owner }}" -PgprPassword="${{ secrets.CR_PAT }}"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.CR_PAT }}

      - name: Start PostgreSQL
        working-directory: .
        run: |
          docker run --name pg-dev \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_DB=postgres \
            -p 5432:5432 \
            -d postgres:18-alpine

      - name: Wait for PostgreSQL to be ready
        working-directory: .
        run: |
          for i in $(seq 1 60); do
            if docker exec pg-dev pg_isready -U postgres -d postgres >/dev/null 2>&1; then
              echo "PostgreSQL is ready."
              exit 0
            fi
            sleep 1
          done
          echo "PostgreSQL did not become ready in time." >&2
          docker logs pg-dev >&2 || true
          exit 1

      - name: Cache Kelpie
        id: cache-tools
        uses: actions/cache@v5
        with:
          path: |
            ${{ runner.temp }}/kelpie
          key: tools-kelpie-${{ inputs.kelpie_version || '1.2.4' }}

      - name: Download Kelpie
        if: steps.cache-tools.outputs.cache-hit != 'true'
        working-directory: .
        run: |
          curl -fsSL -o "$RUNNER_TEMP/kelpie.zip" \
            "https://github.com/scalar-labs/kelpie/releases/download/v${KELPIE_VERSION}/kelpie-${KELPIE_VERSION}.zip"
          unzip -q "$RUNNER_TEMP/kelpie.zip" -d "$RUNNER_TEMP"
          mv "$RUNNER_TEMP/kelpie-${KELPIE_VERSION}" "$RUNNER_TEMP/kelpie"
          rm "$RUNNER_TEMP/kelpie.zip"

      - name: Pull Schema Loader image
        run: docker pull "ghcr.io/scalar-labs/scalardb-schema-loader:${SCHEMA_LOADER_VERSION}"

      - name: Apply fixed config values
        run: |
          sed -i -E "s/^( *run_for_sec *= *).*/\1${RUN_FOR_SEC}/" benchmark-config.toml
          sed -i -E "s/^( *ramp_for_sec *= *).*/\1${RAMP_FOR_SEC}/" benchmark-config.toml
          mkdir -p results

      - name: Run benchmark sweep
        run: |
          set -u
          IFS=',' read -ra LEVELS <<< "${CONCURRENCIES}"
          SCHEMA_LOADER_IMAGE="ghcr.io/scalar-labs/scalardb-schema-loader:${SCHEMA_LOADER_VERSION}"
          KELPIE_BIN="$RUNNER_TEMP/kelpie/bin/kelpie"

          # ScalarDB properties the schema loader uses to reach the host
          # Postgres. The container runs with --network host, so localhost
          # resolves to the published port.
          LOADER_PROPS="$RUNNER_TEMP/schema-loader.properties"
          {
            echo "scalar.db.storage=jdbc"
            echo "scalar.db.contact_points=jdbc:postgresql://localhost:5432/postgres"
            echo "scalar.db.username=postgres"
            echo "scalar.db.password=postgres"
          } > "$LOADER_PROPS"

          load_schema() {
            docker run --rm --network host \
              -v "$LOADER_PROPS:/scalardb.properties:ro" \
              -v "$(pwd)/schema:/schema:ro" \
              "$SCHEMA_LOADER_IMAGE" \
              --config /scalardb.properties \
              --schema-file /schema/tx_transfer.json \
              --coordinator "$@"
          }

          for c in "${LEVELS[@]}"; do
            c="$(echo "$c" | tr -d '[:space:]')"
            echo "::group::Reset schema for concurrency=${c}"
            load_schema --delete-all || true
            load_schema
            echo "::endgroup::"

            echo "::group::Patch concurrency=${c}"
            sed -i -E "s/^( *concurrency *= *).*/\1${c}/" benchmark-config.toml
            grep -E "^ *concurrency *= *" benchmark-config.toml
            echo "::endgroup::"

            echo "::group::Run kelpie (concurrency=${c})"
            LOG="results/run-c${c}.log"
            if "$KELPIE_BIN" --config benchmark-config.toml 2>&1 | tee "$LOG"; then
              echo "Run for concurrency=${c} succeeded."
            else
              echo "Run for concurrency=${c} FAILED with exit ${PIPESTATUS[0]}." >&2
            fi
            # Move any latency CSV produced by kelpie into the results dir.
            for f in latency-*.log latency.log; do
              [ -f "$f" ] && mv "$f" "results/latency-c${c}-$(basename "$f")"
            done
            echo "::endgroup::"
          done

      - name: Summarize results
        if: always()
        run: |
          IFS=',' read -ra LEVELS <<< "${CONCURRENCIES}"
          extract() {
            grep -E "$2" "$1" | tail -n1 | awk -v f="$3" '{print $f}'
          }

          echo "concurrency,throughput,succeeded,failed,mean_ms,sd_ms,p50_ms,p90_ms,p99_ms,max_ms" > results/summary.csv

          {
            echo "# ScalarDB benchmark sweep"
            echo ""
            echo "- Kelpie: \`${KELPIE_VERSION}\`"
            echo "- Schema Loader: \`${SCHEMA_LOADER_VERSION}\`"
            echo "- run_for_sec: \`${RUN_FOR_SEC}\`, ramp_for_sec: \`${RAMP_FOR_SEC}\`"
            echo ""
            echo "| Concurrency | Throughput (ops/s) | Succeeded | Failed | Mean (ms) | SD (ms) | p50 (ms) | p90 (ms) | p99 (ms) | Max (ms) |"
            echo "|---:|---:|---:|---:|---:|---:|---:|---:|---:|---:|"
            for c in "${LEVELS[@]}"; do
              c="$(echo "$c" | tr -d '[:space:]')"
              LOG="results/run-c${c}.log"
              if [ ! -f "$LOG" ]; then
                echo "| ${c} | (no log) | - | - | - | - | - | - | - | - |"
                echo "${c},,,,,,,,," >> results/summary.csv
                continue
              fi
              tp=$(extract   "$LOG" '^Throughput: '               2)
              suc=$(extract  "$LOG" '^Succeeded operations: '     3)
              fail=$(extract "$LOG" '^Failed operations: '        3)
              mean=$(extract "$LOG" '^Mean latency: '             3)
              sd=$(extract   "$LOG" '^SD of latency: '            4)
              p50=$(extract  "$LOG" '^Latency at 50 percentile: ' 5)
              p90=$(extract  "$LOG" '^Latency at 90 percentile: ' 5)
              p99=$(extract  "$LOG" '^Latency at 99 percentile: ' 5)
              max=$(extract  "$LOG" '^Max latency: '              3)
              echo "| ${c} | ${tp:--} | ${suc:--} | ${fail:--} | ${mean:--} | ${sd:--} | ${p50:--} | ${p90:--} | ${p99:--} | ${max:--} |"
              echo "${c},${tp},${suc},${fail},${mean},${sd},${p50},${p90},${p99},${max}" >> results/summary.csv
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Plot throughput vs concurrency (PNG)
        if: always()
        run: |
          if [ ! -s results/summary.csv ]; then
            echo "No summary.csv; skipping plot."
            exit 0
          fi
          python3 -m pip install --quiet matplotlib
          python3 "${{ github.workspace }}/.github/scripts/plot_throughput.py" \
            results/summary.csv results/throughput-vs-concurrency.png

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-results
          path: scalardb-test/results
          if-no-files-found: warn

      - name: Checkout gh-pages branch
        if: always() && github.event_name != 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Update daily report
        if: always() && github.event_name != 'workflow_dispatch'
        run: |
          python3 "${{ github.workspace }}/.github/scripts/update_report.py" \
            --csv results/summary.csv \
            --date "$(date -u +%F)" \
            --pages-dir "${{ github.workspace }}/gh-pages"

      - name: Plot throughput-vs-date PNG
        if: always() && github.event_name != 'workflow_dispatch'
        run: |
          if [ ! -s "${{ github.workspace }}/gh-pages/data.json" ]; then
            echo "No data.json; skipping date-axis plot."
            exit 0
          fi
          python3 -m pip install --quiet matplotlib
          python3 "${{ github.workspace }}/.github/scripts/plot_throughput_history.py" \
            --data-json "${{ github.workspace }}/gh-pages/data.json" \
            --out "${{ github.workspace }}/gh-pages/throughput-vs-date.png" \
            --target-concurrency 16 \
            --days 14

      - name: Commit and push daily report
        if: always() && github.event_name != 'workflow_dispatch'
        working-directory: ${{ github.workspace }}/gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Daily benchmark report: $(date -u +%F)"
          git push origin gh-pages

      - name: Notify Slack
        if: always() && github.event_name != 'workflow_dispatch'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL: eng-benchmark
          PRODUCT: ScalarDB
          IMG_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/throughput-vs-date.png?v=${{ github.sha }}
          IMG_FILE: gh-pages/throughput-vs-date.png
          PAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/?v=${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        working-directory: ${{ github.workspace }}
        run: bash .github/scripts/slack_notify.sh report

      - name: Check throughput anomaly
        id: anomaly
        if: always() && github.event_name != 'workflow_dispatch'
        working-directory: ${{ github.workspace }}
        run: |
          python3 .github/scripts/check_throughput_anomaly.py \
            --data-json gh-pages/data.json \
            --date "$(date -u +%F)" \
            --target-concurrency 16 \
            --days 14 \
            --sigma 3

      - name: Alert throughput anomaly to Slack
        if: always() && github.event_name != 'workflow_dispatch' && steps.anomaly.outputs.anomaly == 'true'
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL: eng-benchmark
          PRODUCT: ScalarDB
          PAGE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/?v=${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          DIRECTION: ${{ steps.anomaly.outputs.direction }}
          LATEST: ${{ steps.anomaly.outputs.latest }}
          MEAN: ${{ steps.anomaly.outputs.mean }}
          SD: ${{ steps.anomaly.outputs.sigma }}
          LOWER: ${{ steps.anomaly.outputs.lower }}
          UPPER: ${{ steps.anomaly.outputs.upper }}
          DEV: ${{ steps.anomaly.outputs.deviation_sigma }}
        working-directory: ${{ github.workspace }}
        run: bash .github/scripts/slack_notify.sh anomaly

      - name: Create JIRA ticket for throughput anomaly
        if: always() && github.event_name != 'workflow_dispatch' && steps.anomaly.outputs.anomaly == 'true'
        env:
          JIRA_AUTH: ${{ secrets.JIRA_AUTH }}
          JIRA_ASSIGNEE_ID: ${{ secrets.JIRA_ASSIGNEE_ID }}
          JIRA_DESCRIPTION_EXTRA: |
            Throughput anomaly at concurrency 16 (${{ steps.anomaly.outputs.direction }}).
            Latest: ${{ steps.anomaly.outputs.latest }} ops/s
            14-day mean: ${{ steps.anomaly.outputs.mean }} ops/s
            SD: ${{ steps.anomaly.outputs.sigma }}
            3-sigma band: [${{ steps.anomaly.outputs.lower }}, ${{ steps.anomaly.outputs.upper }}]
            Deviation: ${{ steps.anomaly.outputs.deviation_sigma }} sigma
            Baseline days: ${{ steps.anomaly.outputs.baseline_n }}
        working-directory: ${{ github.workspace }}
        run: |
          bash .github/scripts/create_jira_ticket.sh \
            "Throughput anomaly at concurrency 16 (${{ steps.anomaly.outputs.direction }})" \
            "ScalarDB benchmark" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        continue-on-error: true

      - name: Stop PostgreSQL
        if: always()
        working-directory: .
        run: |
          docker logs pg-dev > scalardb-test/results/postgres.log 2>&1 || true
          docker rm -f pg-dev || true
